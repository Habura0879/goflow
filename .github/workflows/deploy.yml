name: Deploy to Server via FTP

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Validate approved stage 2 source files
        run: |
          python3 - <<'PY'
          from pathlib import Path

          checks = {
              'index.html': [
                  '/services/ai-business-processes/',
                  'id="ai-home-intro"',
                  'name="phone"',
                  'מערכת לניהול לקוחות',
                  'הטמעת בינה מלאכותית',
              ],
              'about/index.html': [
                  'יועץ תהליכים והטמעת טכנולוגיה, אוטומציה ו־AI',
                  'מחברים טכנולוגיה נכון',
              ],
              'privacy/index.html': [
                  'data-ai-privacy="true"',
                  '8. יצירת קשר',
              ],
              'services/business-automation/index.html': ['data-ai-related="true"'],
              'services/crm-consulting/index.html': ['data-ai-related="true"'],
              'services/process-consulting/index.html': ['data-ai-related="true"'],
              'services/work-procedures/index.html': ['data-ai-related="true"'],
          }

          for filename, required in checks.items():
              text = Path(filename).read_text(encoding='utf-8')
              for needle in required:
                  if needle not in text:
                      raise SystemExit(f'Validation failed: {filename} missing {needle}')

          print('Approved stage 2 source validation passed.')
          PY

      - name: Validate phase 3 SEO source
        run: python3 scripts/phase3-seo.py

      - name: Apply and validate AI article internal links
        run: python3 scripts/add-ai-article-internal-links.py

      - name: Validate AI article and blog integration
        run: python3 scripts/validate-ai-article.py

      - name: Apply and validate phase 3 launch QA
        run: python3 scripts/phase3-qa.py

      - name: Persist phase 3 QA and article link updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 404.html index.html services/ai-business-processes/index.html services/crm-consulting/index.html
          if git diff --cached --quiet; then
            echo "Phase 3 QA and article link updates already persisted."
          else
            git commit -m "Persist approved article links and QA fixes [skip ci]"
            git push origin HEAD:main
          fi

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          state-name: .ftp-deploy-state-v2
          exclude: |
            **/.git*
            **/.git*/**
            scripts/**
            oldsite/**
            setup.php
            deploy.log
            form.log
