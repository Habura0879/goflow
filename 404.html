<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>העמוד לא נמצא | GoFlow</title>
  <link rel="icon" type="image/png" href="/GoFlow_icon_transparent_256x256.png">
  <style>
    :root {
      --ink: #171510;
      --cream: #f6f1e7;
      --gold: #c79b45;
      --white: #fffdf8;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 15%, rgba(199, 155, 69, .18), transparent 28rem),
        var(--cream);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    main {
      width: min(620px, 100%);
      padding: 48px 28px;
      border: 1px solid rgba(23, 21, 16, .12);
      border-radius: 24px;
      background: var(--white);
      box-shadow: 0 24px 70px rgba(23, 21, 16, .08);
    }

    img {
      width: min(230px, 65%);
      height: auto;
    }

    .code {
      margin: 34px 0 8px;
      color: var(--gold);
      font-size: clamp(3.5rem, 14vw, 7rem);
      font-weight: 800;
      line-height: .9;
    }

    h1 {
      margin: 16px 0 12px;
      font-size: clamp(1.7rem, 5vw, 2.6rem);
    }

    p {
      margin: 0 auto 30px;
      max-width: 460px;
      color: #5c574c;
      font-size: 1.08rem;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 13px 24px;
      border-radius: 999px;
      color: var(--white);
      background: var(--ink);
      font-weight: 700;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 4px;
    }
  </style>
</head>
<body>
  <main>
    <img src="/GoFlow_full_logo_black_transparent_1200px.png" width="1200" height="292" alt="GoFlow">
    <div class="code">404</div>
    <h1>העמוד שחיפשת לא נמצא</h1>
    <p>ייתכן שהכתובת השתנתה או שהעמוד הוסר. אפשר לחזור לעמוד הבית ולהמשיך משם.</p>
    <a href="/">חזרה לעמוד הבית</a>
  </main>
<!-- COOKIE CONSENT BANNER -->
<div id="cookie-banner" class="cookie-banner">
  <div class="cookie-banner-inner">
    <p class="cookie-banner-text">
      אתר זה משתמש בקבצי קוקיז (Cookies) כדי להעניק לך את חוויית הגלישה הטובה ביותר ולצורך ניתוח תעבורה. המשך השימוש באתר מהווה הסכמה לכך. למידע נוסף, ניתן לעיין ב<a href="/privacy/" class="cookie-policy-link">מדיניות הפרטיות שלנו</a>.
    </p>
    <button class="cookie-banner-btn" onclick="closeCookieBanner()">הבנתי</button>
  </div>
</div>
</body>
</html>
